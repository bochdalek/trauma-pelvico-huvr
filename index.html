<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0F172A"/>
<title>TAPIR · HUVR</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F1F5F9;--surface:#FFFFFF;--surface2:#F8FAFC;
  --navy:#0F172A;--navy2:#1E293B;--slate:#334155;--slate2:#475569;--muted:#94A3B8;--light:#CBD5E1;--faint:#E2E8F0;
  --teal:#0D9488;--teal-light:#CCFBF1;--teal-dark:#0F766E;
  --blue:#3B82F6;--blue-light:#DBEAFE;--blue-dark:#1D4ED8;
  --red:#EF4444;--red-light:#FEE2E2;--red-dark:#B91C1C;
  --amber:#F59E0B;--amber-light:#FEF3C7;--amber-dark:#B45309;
  --green:#10B981;--green-light:#D1FAE5;--green-dark:#047857;
  --purple:#8B5CF6;--purple-light:#EDE9FE;--purple-dark:#6D28D9;
  --pink:#EC4899;--pink-light:#FCE7F3;--pink-dark:#BE185D;
  --radius:16px;--radius-sm:12px;--radius-xs:8px;
  --shadow:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
  --shadow-md:0 4px 12px rgba(15,23,42,.08),0 2px 4px rgba(15,23,42,.04);
  --shadow-lg:0 10px 25px rgba(15,23,42,.1),0 4px 10px rgba(15,23,42,.06);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--navy);-webkit-font-smoothing:antialiased}
#root{display:flex;flex-direction:column}
.app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;width:100%;position:relative;overflow:hidden}

/* ===== HEADER ===== */
.header{
  background:linear-gradient(135deg,#0F172A 0%,#1E293B 50%,#0F766E 100%);
  padding:10px 20px;padding-top:calc(10px + var(--safe-top));
  flex-shrink:0;position:relative;overflow:hidden;z-index:20;
}
.header::after{content:'';position:absolute;top:-50%;right:-30%;width:200px;height:200px;background:radial-gradient(circle,rgba(13,148,136,.2),transparent 70%);pointer-events:none}
.header-inner{display:flex;align-items:center;justify-content:space-between}
.header-brand{display:flex;align-items:center;gap:10px}
.header-logo{width:32px;height:32px;background:linear-gradient(135deg,var(--teal),#2DD4BF);border-radius:8px;display:flex;align-items:center;justify-content:center}
.header-logo svg{width:18px;height:18px}
.header h1{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.2px}
.header .version{font-size:10px;color:rgba(255,255,255,.5);font-weight:500}
.header-accent{height:2px;background:linear-gradient(90deg,var(--teal),#2DD4BF,var(--blue));flex-shrink:0}

/* ===== TAB BAR ===== */
.tabbar{
  display:flex;background:var(--surface);
  border-top:1px solid var(--faint);
  padding:6px 8px;padding-bottom:calc(6px + var(--safe-bottom));
  flex-shrink:0;z-index:20;gap:2px;
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:6px 2px;border-radius:var(--radius-xs);cursor:pointer;
  transition:all .2s;position:relative;user-select:none;
}
.tab-icon{width:24px;height:24px;margin-bottom:2px;opacity:.4;transition:all .2s}
.tab-label{font-size:10px;font-weight:600;color:var(--muted);transition:color .2s;letter-spacing:-.1px}
.tab.active .tab-icon{opacity:1}
.tab.active .tab-label{color:var(--teal)}
.tab.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--teal);border-radius:2px}
.tab:active{transform:scale(.92);background:var(--surface2)}

/* ===== CONTENT ===== */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px 24px}

/* ===== CARDS ===== */
.card{background:var(--surface);border-radius:var(--radius);padding:20px;margin-bottom:14px;box-shadow:var(--shadow);border:1px solid rgba(226,232,240,.6)}
.card-sm{padding:16px;border-radius:var(--radius-sm)}
.card-flat{box-shadow:none;border:1px solid var(--faint)}
.card-glow{box-shadow:var(--shadow-md);border:1px solid rgba(13,148,136,.15)}

/* ===== HOME ===== */
.hero{
  background:linear-gradient(135deg,#0F172A,#1E293B 60%,#134E4A);
  border-radius:var(--radius);padding:28px 24px;color:#fff;
  margin-bottom:20px;position:relative;overflow:hidden;
}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(45,212,191,.15),transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-30px;left:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(59,130,246,.1),transparent 70%);pointer-events:none}
.hero-eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:rgba(45,212,191,.8);margin-bottom:8px}
.hero h2{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px;line-height:1.2}
.hero p{font-size:13px;opacity:.6;line-height:1.5}
.hero-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.1);backdrop-filter:blur(10px);padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;color:rgba(255,255,255,.8);margin-top:12px}
.hero-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:#2DD4BF}

.action-card{
  display:flex;align-items:center;gap:14px;
  background:var(--surface);border-radius:var(--radius);
  padding:18px 20px;margin-bottom:10px;cursor:pointer;
  box-shadow:var(--shadow);border:1px solid transparent;
  transition:all .2s;user-select:none;position:relative;overflow:hidden;
}
.action-card:active{transform:scale(.97);box-shadow:var(--shadow-md);border-color:var(--teal)}
.action-card .ac-icon{
  width:48px;height:48px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:22px;position:relative;
}
.action-card .ac-content{flex:1;min-width:0}
.action-card .ac-title{font-size:15px;font-weight:700;letter-spacing:-.2px;margin-bottom:2px}
.action-card .ac-desc{font-size:12px;color:var(--slate2);line-height:1.4}
.action-card .ac-arrow{color:var(--light);font-size:18px;flex-shrink:0;transition:transform .2s}
.action-card:active .ac-arrow{transform:translateX(3px);color:var(--teal)}

/* ===== GUIDE ===== */
.guide-progress{display:flex;align-items:center;gap:4px;margin-bottom:16px;padding:0 4px}
.gp-dot{width:10px;height:10px;border-radius:50%;background:var(--faint);transition:all .3s;flex-shrink:0}
.gp-dot.done{background:var(--green);transform:scale(.85)}
.gp-dot.active{background:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,.2);transform:scale(1.1)}
.gp-line{flex:1;height:2px;background:var(--faint);border-radius:1px;min-width:8px}
.gp-line.done{background:var(--green)}

.guide-card{
  background:var(--surface);border-radius:var(--radius);overflow:hidden;
  box-shadow:var(--shadow-md);border:1px solid rgba(226,232,240,.5);
  animation:slideUp .3s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeScale{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}

.guide-card-header{padding:20px 20px 0}
.guide-card-body{padding:16px 20px 20px}
.guide-question{font-size:17px;font-weight:700;letter-spacing:-.3px;line-height:1.35;color:var(--navy)}

.ctx-box{display:flex;gap:10px;padding:12px 14px;border-radius:var(--radius-xs);margin:12px 0;font-size:12px;line-height:1.6;align-items:flex-start}
.ctx-box .ctx-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.ctx-info{background:var(--blue-light);color:var(--blue-dark)}
.ctx-warn{background:var(--amber-light);color:var(--amber-dark)}
.ctx-danger{background:var(--red-light);color:var(--red-dark)}
.ctx-success{background:var(--green-light);color:var(--green-dark)}
.ctx-action{background:linear-gradient(135deg,#CCFBF1,#D1FAE5);color:var(--teal-dark);border:1px solid rgba(13,148,136,.15)}

.opt-btn{
  display:block;width:100%;text-align:left;
  padding:14px 16px;margin-bottom:8px;
  background:var(--surface2);border:2px solid var(--faint);
  border-radius:var(--radius-sm);cursor:pointer;
  transition:all .15s;position:relative;overflow:hidden;
}
.opt-btn:last-child{margin-bottom:0}
.opt-btn:active{border-color:var(--teal);background:var(--teal-light);transform:scale(.98)}
.opt-btn .opt-label{font-size:14px;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:6px}
.opt-btn .opt-desc{font-size:11.5px;color:var(--slate2);margin-top:4px;line-height:1.5}
.opt-btn .opt-chevron{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--light);font-size:14px}

.action-banner{
  background:linear-gradient(135deg,var(--teal-dark),var(--teal));
  color:#fff;padding:16px 18px;border-radius:var(--radius-sm);
  margin-bottom:14px;position:relative;overflow:hidden;
}
.action-banner::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;background:radial-gradient(circle,rgba(255,255,255,.1),transparent);pointer-events:none}
.action-banner h3{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px;margin-bottom:6px}
.action-banner p{font-size:12.5px;opacity:.9;line-height:1.6}

.danger-banner{background:linear-gradient(135deg,var(--red-dark),var(--red))}

.btn{
  display:block;width:100%;padding:14px;border-radius:var(--radius-sm);
  border:none;font-size:14px;font-weight:600;cursor:pointer;
  transition:all .15s;text-align:center;letter-spacing:-.1px;
}
.btn-primary{
  background:linear-gradient(135deg,var(--teal-dark),var(--teal));
  color:#fff;box-shadow:0 2px 8px rgba(13,148,136,.25);
}
.btn-primary:active{transform:scale(.97);box-shadow:0 1px 4px rgba(13,148,136,.3)}
.btn-ghost{background:transparent;color:var(--slate2);font-size:13px}
.btn-ghost:active{background:var(--surface2)}
.btn-outline{background:transparent;border:2px solid var(--faint);color:var(--slate)}
.btn-outline:active{border-color:var(--teal);color:var(--teal);background:var(--teal-light)}

/* History breadcrumbs */
.breadcrumbs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px}
.bc-chip{padding:4px 10px;background:var(--teal-light);border-radius:20px;font-size:10px;color:var(--teal-dark);font-weight:600}

/* Result */
.result-card{
  border-radius:var(--radius);overflow:hidden;
  box-shadow:var(--shadow-lg);animation:fadeScale .35s ease;margin-bottom:16px;
}
.result-header{padding:24px 20px 16px;color:#fff;position:relative;overflow:hidden}
.result-header::after{content:'';position:absolute;top:-30%;right:-10%;width:150px;height:150px;background:radial-gradient(circle,rgba(255,255,255,.1),transparent);pointer-events:none}
.result-header h3{font-size:18px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.result-body{background:var(--surface);padding:20px}
.result-step{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
.result-step:last-child{margin-bottom:0}
.result-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;margin-top:1px}
.result-text{font-size:13px;line-height:1.6;color:var(--slate)}

/* ===== REFERENCE ===== */
.ref-item{margin-bottom:8px}
.ref-trigger{
  display:flex;align-items:center;gap:12px;
  padding:16px 18px;background:var(--surface);
  border-radius:var(--radius-sm);cursor:pointer;
  box-shadow:var(--shadow);border:1px solid transparent;
  transition:all .2s;user-select:none;
}
.ref-trigger:active{border-color:var(--teal)}
.ref-trigger .ref-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ref-trigger .ref-title{font-size:14px;font-weight:600;letter-spacing:-.1px;flex:1}
.ref-trigger .ref-chev{font-size:12px;color:var(--light);transition:transform .25s}
.ref-trigger .ref-chev.open{transform:rotate(180deg);color:var(--teal)}
.ref-body{
  background:var(--surface);padding:0 18px 18px;margin-top:-4px;
  border-radius:0 0 var(--radius-sm) var(--radius-sm);
  box-shadow:var(--shadow);animation:slideUp .2s ease;
}
.ref-body p{font-size:13px;line-height:1.65;color:var(--slate);margin-bottom:8px}
.ref-body ul{padding-left:18px;margin:6px 0}
.ref-body li{font-size:13px;line-height:1.6;color:var(--slate);margin-bottom:5px}
.ref-body h4{font-size:13px;font-weight:700;color:var(--navy);margin:12px 0 6px}

/* Tables */
.tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;margin:10px 0;border-radius:var(--radius-xs);overflow:hidden;border:1px solid var(--faint)}
.tbl th{background:var(--navy);color:#fff;padding:10px 12px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--faint)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:nth-child(even) td{background:var(--surface2)}
.tbl td:first-child{font-weight:600}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px}
.badge-green{background:var(--green-light);color:var(--green-dark)}
.badge-red{background:var(--red-light);color:var(--red-dark)}
.badge-amber{background:var(--amber-light);color:var(--amber-dark)}
.badge-blue{background:var(--blue-light);color:var(--blue-dark)}
.badge-purple{background:var(--purple-light);color:var(--purple-dark)}

/* ===== ALGO VIEWER ===== */
.algo-wrap{margin:-20px -16px -24px;height:calc(100vh - 100px);position:relative;background:var(--surface2);overflow:hidden;touch-action:none}
.algo-img{position:absolute;top:0;left:0;transform-origin:0 0;cursor:grab;will-change:transform}
.algo-img:active{cursor:grabbing}
.algo-toolbar{
  position:absolute;bottom:20px;right:16px;
  display:flex;flex-direction:column;gap:6px;z-index:5;
}
.algo-tbtn{
  width:44px;height:44px;border-radius:12px;border:none;
  background:rgba(255,255,255,.95);backdrop-filter:blur(8px);
  box-shadow:var(--shadow-md);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--navy);font-weight:700;transition:all .15s;
}
.algo-tbtn:active{transform:scale(.88);background:var(--teal-light);color:var(--teal)}
.algo-toast{
  position:absolute;top:16px;left:50%;transform:translateX(-50%);
  background:rgba(15,23,42,.85);backdrop-filter:blur(8px);
  color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:500;
  pointer-events:none;transition:opacity .4s;z-index:5;
  display:flex;align-items:center;gap:6px;
}
.algo-toast.hide{opacity:0}

/* ===== INFO ===== */
.info-header{text-align:center;padding:20px 0 10px}
.info-logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--navy),var(--teal-dark));display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.info-logo svg{width:28px;height:28px}
.info-version{font-size:11px;color:var(--muted);font-weight:500}

/* ===== UTILS ===== */
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mb-8{margin-bottom:8px}
.text-center{text-align:center}
.text-xs{font-size:11px}.text-muted{color:var(--muted)}
.gap-8{gap:8px}.flex{display:flex}.items-center{align-items:center}
.divider{height:1px;background:var(--faint);margin:16px 0}
</style>
</head>

/* ALGORITHM VIEWER */
function Algo(){
  const cRef=useRef(null);
  const [sc,setSc]=useState(.35);
  const [pos,setPos]=useState({x:0,y:0});
  const [drag,setDrag]=useState(false);
  const ds=useRef({x:0,y:0});
  const td=useRef(null);
  const [toast,setToast]=useState(true);

  useEffect(()=>{
    if(cRef.current){const cw=cRef.current.clientWidth,ch=cRef.current.clientHeight,f=Math.min(cw/1320,ch/1540)*.95;setSc(f);setPos({x:(cw-1320*f)/2,y:10})}
    const t=setTimeout(()=>setToast(false),2500);return()=>clearTimeout(t);
  },[]);

  function zm(d){setSc(s=>Math.max(.12,Math.min(2.5,s+d)))}
  function rst(){if(!cRef.current)return;const cw=cRef.current.clientWidth,ch=cRef.current.clientHeight,f=Math.min(cw/1320,ch/1540)*.95;setSc(f);setPos({x:(cw-1320*f)/2,y:10})}
  function onMD(e){setDrag(true);ds.current={x:e.clientX-pos.x,y:e.clientY-pos.y}}
  function onMM(e){if(drag)setPos({x:e.clientX-ds.current.x,y:e.clientY-ds.current.y})}
  function onMU(){setDrag(false)}
  function onTS(e){if(e.touches.length===1){setDrag(true);ds.current={x:e.touches[0].clientX-pos.x,y:e.touches[0].clientY-pos.y};td.current=null}if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;td.current=Math.sqrt(dx*dx+dy*dy)}}
  function onTM(e){e.preventDefault();if(e.touches.length===1&&drag)setPos({x:e.touches[0].clientX-ds.current.x,y:e.touches[0].clientY-ds.current.y});if(e.touches.length===2&&td.current){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.sqrt(dx*dx+dy*dy);setSc(s=>Math.max(.12,Math.min(2.5,s*(d/td.current))));td.current=d}}
  function onTE(){setDrag(false);td.current=null}
  function onWh(e){e.preventDefault();zm(e.deltaY>0?-.06:.06)}

  return React.createElement('div',{className:'algo-wrap',ref:cRef,onMouseDown:onMD,onMouseMove:onMM,onMouseUp:onMU,onMouseLeave:onMU,onTouchStart:onTS,onTouchMove:onTM,onTouchEnd:onTE,onWheel:onWh},
    React.createElement('img',{src:SVG_DATA_URI,className:'algo-img',style:{transform:`translate(${pos.x}px,${pos.y}px) scale(${sc})`,width:1320,height:1540},draggable:false}),
    React.createElement('div',{className:'algo-toast'+(toast?'':' hide')},'👆 Pellizca para zoom · Arrastra para mover'),
    React.createElement('div',{className:'algo-toolbar'},
      React.createElement('button',{className:'algo-tbtn',onClick:()=>zm(.12)},'+'),
      React.createElement('button',{className:'algo-tbtn',onClick:()=>zm(-.12)},'−'),
      React.createElement('button',{className:'algo-tbtn',style:{fontSize:16},onClick:rst},'⟲')
    )
  );
}

function App(){
  const [tab,setTab]=useState('home');
  const tabs=[{id:'home',label:'Inicio'},{id:'guide',label:'Guía'},{id:'algo',label:'Algoritmo'},{id:'ref',label:'Referencia'},{id:'info',label:'Info'}];
  return React.createElement('div',{className:'app'},
    React.createElement('div',{className:'header'},
      React.createElement('div',{className:'header-inner'},
        React.createElement('div',{className:'header-brand'},
          React.createElement('div',{className:'header-logo'},
            React.createElement('svg',{width:18,height:18,viewBox:'0 0 24 24',fill:'none',stroke:'#fff',strokeWidth:2},
              React.createElement('path',{d:'M12 2L2 7l10 5 10-5-10-5z'}),React.createElement('path',{d:'M2 17l10 5 10-5'}),React.createElement('path',{d:'M2 12l10 5 10-5'}))
          ),
          React.createElement('div',null,
            React.createElement('h1',null,'TAPIR'),
            React.createElement('span',{className:'version'},'Trauma Abdomino-Pélvico · HUVR')
          )
        )
      )
    ),
    React.createElement('div',{className:'header-accent'}),
    React.createElement('div',{className:'content',key:tab},
      tab==='home'&&React.createElement(Home,{go:setTab}),
      tab==='guide'&&React.createElement(Guide),
      tab==='algo'&&React.createElement(Algo),
      tab==='ref'&&React.createElement(Ref),
      tab==='info'&&React.createElement(Info)
    ),
    React.createElement('div',{className:'tabbar'},
      tabs.map(t=>React.createElement('div',{key:t.id,className:'tab'+(tab===t.id?' active':''),onClick:()=>setTab(t.id)},
        icons[t.id](tab===t.id),
        React.createElement('span',{className:'tab-label'},t.label)
      ))
    )
  );
}

ReactDOM.render(React.createElement(App),document.getElementById('root'));
